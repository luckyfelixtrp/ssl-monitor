# ============================================================
#  SSL Monitor - Nginx 站点配置 (Docker 容器内使用)
#  - 托管前端静态页 (Vue build 产出的 dist)
#  - 反向代理 /api/ 到后端 Tomcat (war 部署，context = /ssl-monitor)
#
#  环境变量：
#    BACKEND_URL - 后端地址，默认 http://backend:8080 (bridge 网络)
#                  host 网络模式下设为 http://127.0.0.1:8091
# ============================================================

server {
    listen       8090;
    server_name  _;

    # 前端静态目录
    root   /usr/share/nginx/html;
    index  index.html;

    # 单页应用回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端 Tomcat。
    # war 名为 ssl-monitor.war -> context path = /ssl-monitor
    # 因此前端的 /api/xxx 映射到后端 /ssl-monitor/api/xxx
    # BACKEND_URL 由 docker-compose 环境变量注入
    location /api/ {
        proxy_pass         ${BACKEND_URL}/ssl-monitor/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    # 静态资源缓存
    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}