name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- 前端构建 ----
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ---- 后端构建 ----
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build WAR
        working-directory: backend-java
        run: mvn clean package -DskipTests -B

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-war
          path: backend-java/target/ssl-monitor.war

  # ---- Docker 镜像构建（验证 Dockerfile 能用）----
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build ./frontend/ -t ssl-monitor-frontend:ci

      - name: Build backend image
        run: docker build ./backend-java/ -t ssl-monitor-backend:ci

  # ---- 桌面版 exe ----
  desktop-exe:
    runs-on: windows-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Build exe
        run: pyinstaller ssl-monitor.spec --noconfirm

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: ssl-monitor-exe
          path: dist/SSL证书监控.exe

  # ---- 发布 Release（仅打 tag 时触发）----
  release:
    runs-on: ubuntu-latest
    needs: [frontend, backend, desktop-exe]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: release/frontend-dist/

      - uses: actions/download-artifact@v4
        with:
          name: backend-war
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: ssl-monitor-exe
          path: release/

      - name: Zip frontend dist
        run: cd release && zip -r frontend-dist.zip frontend-dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ssl-monitor.war
            release/frontend-dist.zip
            release/SSL证书监控.exe