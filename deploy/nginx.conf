# ============================================================
#  SSL Monitor - Nginx 站点配置 (裸机部署使用)
#  - 托管前端静态页 (Vue build 产出的 dist)
#  - 反向代理 /api/ 到后端 Tomcat (war 部署，context = /ssl-monitor)
#  放置到: /etc/nginx/conf.d/ssl-monitor.conf
# ============================================================

server {
    listen       80;
    server_name  _;            # 换成你的域名，如 sslmon.example.com

    # 前端静态目录：把 frontend/dist/ 里的文件拷到这里
    root   /var/www/ssl-monitor;
    index  index.html;

    # 单页应用回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Tomcat。
    # Tomcat 默认端口 8080，war 名为 ssl-monitor.war -> context path = /ssl-monitor
    # 因此前端的 /api/xxx 映射到后端 /ssl-monitor/api/xxx
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/ssl-monitor/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;   # 检测可能较慢，放宽超时
    }

    # 静态资源缓存
    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
